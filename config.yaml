params:
  # theme
  showToc: true
  TocOpen: false
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  hideMeta: false
  ShowShareButtons: true
  author: "Prajwol Bikram Adhikari"
  # Default image for OpenGraph and Twitter Cards (creates rich link previews)
  images: ["images/og-default.png"]
  
  description: "Graduate student in Software Engineering & DevOps at WGU. Building homelabs, automating pipelines, and learning the intricacies of pharma manufacturing at AbbVie."
  # for enchanced SEO
  env: production

  # This keeps the navbar title clean and short instead of using the very long SEO title
  label:
    text: "Prajwol Bikram Adhikari"

  assets:
    favicon: "favicon.svg"

  # Home Page
  profileMode:
    enabled: true
    title: "Hi, I'm&nbsp;<span class=\"text-highlight\">Prajwol</span> <span class=\"hand-emoji\">🙏</span>"
    subtitle: >
        <div class="code-tag">
            <span class="prompt">>_</span> Hybrid Cloud Architect <span class="pipe">|</span> WGU Master's Student
        </div>
        <div class="profile-description">
            Software Engineering & DevOps Grad Student at <a href="https://www.wgu.edu/" target="_blank"><strong class="white-bold">WGU</strong></a>. Building highly-available homelabs, automating CI/CD pipelines, and driving operational excellence at <a href="https://www.abbvie.com/" target="_blank"><strong class="white-bold">AbbVie</strong></a>.
        </div>
        <div class="location-tag">
            <span class="grey-icon"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></svg></span> Texas, USA <span class="dot">•</span> <span class="grey-icon"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg></span> Guitarist
        </div>
        <div class="tech-stack">
            <a href="/tags/docker/"><span class="tech-badge">Docker</span></a>
            <a href="/tags/linux/"><span class="tech-badge">Linux</span></a>
            <a href="/tags/automation/"><span class="tech-badge">IaC</span></a>
            <a href="/tags/cicd/"><span class="tech-badge">CI/CD</span></a>
            <a href="/tags/cloud/"><span class="tech-badge">AWS</span></a>
        </div>

    # Profile Image
    imageUrl: "home/casual-small-square.jpg"
    imageWidth: 215
    imageHeight: 215
    buttons:
    - name: "Resume"
      url: "https://forms.gle/y4fGDZ1q5HTDsLSH6"

  # List View
  hideDescriptionInList: false

  # cover image for posts
  cover:
    hiddenInList: false # hide on list pages and home
    hiddenInSingle: false # hide on single page

  socialIcons:
    
    - name: "email"
      url: "mailto:prajwolad18@gmail.com"
    - name: "linkedin"
      url: "https://www.linkedin.com/in/pbadk/"
    - name: "github"
      url: "https://github.com/nasdesps"
    - name: "medium"
      url: "https://medium.com/@prajwolad18"
    - name: "dev"
      url: "https://dev.to/prajwol-ad" 
    - name: "x"
      url: "https://x.com/Prajwolize"
    - name: "soundcloud"
      url: "https://soundcloud.com/prajwol-adhikari-358294646"
    

  # text search
  fuseOpts:
    isCaseSensitive: false
    shouldSort: true
    location: 0
    distance: 1000
    threshold: 0.4
    minMatchCharLength: 0
    keys: ["title", "permalink", "summary", "content"]

# for search using Fuse.js
outputs:
  home:
    - HTML
    - RSS
    - JSON

# allow HTML in MD
markup:
  goldmark:
    renderer:
      unsafe: true

minify:
  disableXML: true
  minifyOutput: true
