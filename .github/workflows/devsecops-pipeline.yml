name: DevSecOps CI/CD Pipeline

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

# ── Global Permissions ──
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  # ── Stage 1: Secret Scanning ──────────────────────────────────────
  secret-scan:
    name: Gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── Stage 2: SAST (CodeQL) ────────────────────────────────────────
  codeql:
    name: CodeQL
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: javascript
      - uses: github/codeql-action/autobuild@v3
      - uses: github/codeql-action/analyze@v3

  # ── Stage 3: Dependency Review ────────────────────────────────────
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high

  # ── Stage 4: Build ────────────────────────────────────────────────
  build:
    name: Build Hugo
    runs-on: ubuntu-latest
    needs: [secret-scan, codeql, dependency-review]
    if: ${{ !failure() && !cancelled() }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - name: Build with Docker
        run: |
          docker run --rm \
            --user $(id -u):$(id -g) \
            -v ${{ github.workspace }}:/src \
            -w /src \
            floryn90/hugo:0.120.4-ext-alpine \
            --minify --gc

      # Upload uncompressed HTML for Lighthouse
      - name: Upload uncompressed artifact for Lighthouse
        uses: actions/upload-artifact@v4
        with:
          name: public-site
          path: public/

        # Upload compressed tarball for GitHub Pages
      - name: Upload artifact for Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: public/

  # ── Stage 4: Lighthouse ───────────────────────────────────────────
  lighthouse:
    name: Lighthouse Audit
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v4
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: public-site
          path: public/

      # SRE FIX: Delete admin files before the audit so LHCI ignores them
      - name: Prune non-content files from audit
        run: rm -f public/google*.html public/404.html

      - name: Serve & audit
        uses: treosh/lighthouse-ci-action@v11
        with:
          uploadArtifacts: true
          temporaryPublicStorage: true
          configPath: .lighthouserc.json

  # ── Stage 6: Deploy (Blue/Green Staging) ─────────────────────────
  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: [build, lighthouse]
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
